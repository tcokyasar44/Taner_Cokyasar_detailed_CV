name: Compile and Publish CV

# This tells GitHub to run this script every time you push changes from Overleaf
on: 
  push:
    branches: [ main ]

# Grants permission for the script to save the PDF back to your repository
permissions:
  contents: write

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: TC_resume.tex
          compiler: latexmk
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      # This step takes the freshly compiled PDF and saves it back to your repo
      - name: Commit compiled PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-compile CV PDF"
          file_pattern: TC_resume.pdf
